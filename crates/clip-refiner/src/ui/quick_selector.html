<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url("selector.css");
    </style>
</head>

<body>
    <div id="container">
        <div id="search-box">
            <div class="selector-heading">クイックセレクター</div>
            <input type="text" id="input" placeholder="モード名・カテゴリ・CLI名で検索..." autocomplete="off" spellcheck="false">
        </div>
        <div id="results"></div>
        <div id="footer">
            <span>操作: <kbd>↑↓</kbd> 移動, <kbd>Enter</kbd> 決定, <kbd>Ctrl+D</kbd> お気に入り, <kbd>Ctrl+Shift+↑↓</kbd> 順序</span>
            <span>閉じる: <kbd>Esc</kbd></span>
        </div>
    </div>

    <script src="selector-common.js"></script>
    <script type="application/json" id="modes-data">[]</script>

    <script>
        const {
            normalizeQuery,
            highlightText,
            escapeHtml,
            postIpc,
            close,
            createSelection,
            handleArrowKeys,
            handleHomeEndKeys,
            handleEscapeKey,
            focusSearchInput,
        } = window.SelectorCommon;

        let modes = JSON.parse(document.getElementById('modes-data').textContent);
        const input = document.getElementById('input');
        const results = document.getElementById('results');
        const FAVORITES_CATEGORY = 'お気に入り';

        let currentModeId = null;
        let filtered = buildDisplayList('');
        const selection = createSelection(results, () => filtered.length);

        function loadModes(nextModes) {
            modes = nextModes;
            filtered = buildDisplayList('');
        }

        function modeById(id) {
            return modes.find((mode) => mode.id === id);
        }

        function favoriteIds() {
            return modes
                .filter((mode) => mode.favorite)
                .sort((a, b) => {
                    const left = a.favoriteIndex ?? Number.MAX_SAFE_INTEGER;
                    const right = b.favoriteIndex ?? Number.MAX_SAFE_INTEGER;
                    return left - right;
                })
                .map((mode) => mode.id);
        }

        function buildDisplayList(query) {
            if (query) {
                return modes.filter((mode) => modeMatches(mode, query));
            }

            const display = [];
            for (const id of favoriteIds()) {
                const mode = modeById(id);
                if (mode) {
                    display.push({ ...mode, listSection: 'favorites' });
                }
            }
            for (const mode of modes) {
                display.push({ ...mode, listSection: 'category' });
            }
            return display;
        }

        function modeMatches(mode, query) {
            if (!query) {
                return true;
            }

            const fields = [mode.label, mode.category, mode.value, mode.id];
            return fields.some((field) => field && field.toLowerCase().includes(query));
        }

        function createReorderButtons(mode, query) {
            if (query || mode.listSection !== 'favorites' || !mode.favorite) {
                return null;
            }

            const ids = favoriteIds();
            const index = ids.indexOf(mode.id);
            if (index === -1) {
                return null;
            }

            const container = document.createElement('div');
            container.className = 'reorder-buttons';

            const upButton = document.createElement('button');
            upButton.type = 'button';
            upButton.className = 'reorder-button';
            upButton.textContent = '▲';
            upButton.title = '上へ移動';
            upButton.disabled = index === 0;
            upButton.onclick = (event) => {
                event.stopPropagation();
                moveFavorite(mode.id, 'up');
            };

            const downButton = document.createElement('button');
            downButton.type = 'button';
            downButton.className = 'reorder-button';
            downButton.textContent = '▼';
            downButton.title = '下へ移動';
            downButton.disabled = index === ids.length - 1;
            downButton.onclick = (event) => {
                event.stopPropagation();
                moveFavorite(mode.id, 'down');
            };

            container.appendChild(upButton);
            container.appendChild(downButton);
            return container;
        }

        function createFavoriteButton(mode) {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'favorite-button' + (mode.favorite ? ' is-favorite' : '');
            button.title = mode.favorite ? 'お気に入りから解除' : 'お気に入りに登録';
            button.setAttribute('aria-label', button.title);
            button.textContent = mode.favorite ? '★' : '☆';
            button.onclick = (event) => {
                event.stopPropagation();
                toggleFavorite(mode.id);
            };
            return button;
        }

        function createItem(mode, index, query) {
            const isCurrent = mode.id === currentModeId;
            const div = document.createElement('div');
            div.className = 'item' +
                (index === selection.index ? ' selected' : '') +
                (isCurrent ? ' current' : '');

            div.innerHTML = `
                <div class="mode-info">
                    <span class="label">${highlightText(mode.label, query)}</span>
                    ${isCurrent ? '<span class="current-badge">選択中</span>' : ''}
                </div>
                ${query && mode.value ? `<span class="value-hint">${highlightText(mode.value, query)}</span>` : ''}
            `;

            const reorderButtons = createReorderButtons(mode, query);
            if (reorderButtons) {
                div.appendChild(reorderButtons);
            }
            div.appendChild(createFavoriteButton(mode));

            div.onmouseenter = () => selection.setSelectedIndex(index, false);
            div.onclick = () => select(mode.id);
            return div;
        }

        function sectionCategory(mode, query) {
            if (query) {
                return null;
            }
            if (mode.listSection === 'favorites') {
                return FAVORITES_CATEGORY;
            }
            return mode.category || '';
        }

        function renderList(scrollToSelection) {
            results.innerHTML = '';
            const query = normalizeQuery(input.value);
            selection.clampSelectedIndex();

            if (filtered.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = '該当するモードがありません';
                results.appendChild(empty);
                return;
            }

            let itemIndex = 0;
            let lastCategory = null;
            let currentSection = null;
            let rootSection = null;

            filtered.forEach((mode) => {
                let parent = results;
                const category = sectionCategory(mode, query);

                if (!query) {
                    if (category) {
                        if (category !== lastCategory) {
                            currentSection = document.createElement('div');
                            currentSection.className = 'category-section';
                            if (category === FAVORITES_CATEGORY) {
                                currentSection.classList.add('category-section--favorites');
                            }

                            const header = document.createElement('div');
                            header.className = 'category-header';
                            header.innerHTML =
                                '<span class="category-accent" aria-hidden="true"></span>' +
                                '<span class="category-label">' + escapeHtml(category) + '</span>';
                            currentSection.appendChild(header);
                            results.appendChild(currentSection);
                            lastCategory = category;
                        }
                        parent = currentSection;
                    } else {
                        if (!rootSection) {
                            rootSection = document.createElement('div');
                            rootSection.className = 'category-section category-section--plain';
                            results.appendChild(rootSection);
                        }
                        parent = rootSection;
                    }
                }

                parent.appendChild(createItem(mode, itemIndex, query));
                itemIndex++;
            });

            if (scrollToSelection) {
                selection.scrollSelectedIntoView();
            }
        }

        function filter() {
            const query = normalizeQuery(input.value);
            const previousId = filtered[selection.index]?.id;

            filtered = buildDisplayList(query);

            const nextIndex = previousId
                ? filtered.findIndex((mode) => mode.id === previousId)
                : -1;
            selection.index = nextIndex !== -1 ? nextIndex : 0;
            renderList(true);
        }

        function select(id) {
            postIpc('select:' + id);
        }

        function toggleFavorite(id) {
            postIpc('toggle-favorite:' + id);
        }

        function moveFavorite(id, direction) {
            postIpc('move-favorite:' + id + ':' + direction);
        }

        function moveSelectedFavorite(delta) {
            if (normalizeQuery(input.value)) {
                return false;
            }

            const mode = filtered[selection.index];
            if (!mode || mode.listSection !== 'favorites' || !mode.favorite) {
                return false;
            }

            moveFavorite(mode.id, delta < 0 ? 'up' : 'down');
            return true;
        }

        function applyFocus(modeId) {
            currentModeId = modeId;
            input.value = '';
            filter();

            const index = filtered.findIndex((mode) => mode.id === currentModeId);
            if (index !== -1) {
                selection.index = index;
            }

            renderList(true);
            focusSearchInput(input);
        }

        input.oninput = filter;

        window.onkeydown = (e) => {
            if (handleArrowKeys(e, selection.moveSelection)) {
                return;
            }
            if (handleHomeEndKeys(e, () => filtered.length, selection.setSelectedIndex)) {
                return;
            }
            if (e.key === 'Enter') {
                if (filtered[selection.index]) {
                    select(filtered[selection.index].id);
                    e.preventDefault();
                }
                return;
            }
            if (handleEscapeKey(e, input, filter, close)) {
                return;
            }
            if (e.key.toLowerCase() === 'd' && (e.ctrlKey || e.metaKey)) {
                if (filtered[selection.index]) {
                    toggleFavorite(filtered[selection.index].id);
                    e.preventDefault();
                }
            } else if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'ArrowUp') {
                if (moveSelectedFavorite(-1)) {
                    e.preventDefault();
                }
            } else if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'ArrowDown') {
                if (moveSelectedFavorite(1)) {
                    e.preventDefault();
                }
            }
        };

        // UI表示時にフォーカスを当てる
        window.focusInput = (modeId, modesJson) => {
            if (modesJson) {
                loadModes(modesJson);
            }
            applyFocus(modeId);
        };

        // お気に入り更新後に一覧を再描画する
        window.refreshModes = (modeId, modesJson) => {
            const previousId = filtered[selection.index]?.id;
            if (modesJson) {
                loadModes(modesJson);
            }
            currentModeId = modeId;
            filtered = buildDisplayList(normalizeQuery(input.value));
            const nextIndex = previousId
                ? filtered.findIndex((mode) => mode.id === previousId)
                : -1;
            selection.index = nextIndex !== -1 ? nextIndex : 0;
            renderList(true);
        };

        renderList(false);
    </script>
</body>

</html>

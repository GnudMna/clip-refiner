<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url("selector.css");

        .selector-heading {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="search-box">
            <div class="selector-heading">クイックセレクター</div>
            <input type="text" id="input" placeholder="モード名・カテゴリ・CLI名で検索..." autocomplete="off" spellcheck="false">
        </div>
        <div id="results"></div>
        <div id="footer">
            <span>操作: <kbd>↑↓</kbd> 移動, <kbd>Enter</kbd> 決定</span>
            <span>閉じる: <kbd>Esc</kbd></span>
        </div>
    </div>

    <script type="application/json" id="modes-data">[]</script>

    <script>
        const modes = JSON.parse(document.getElementById('modes-data').textContent);
        const input = document.getElementById('input');
        const results = document.getElementById('results');

        let currentModeId = null;
        let filtered = [...modes];
        let selectedIndex = 0;

        function normalizeQuery(query) {
            return query.toLowerCase().trim();
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function highlightText(text, query) {
            const safe = escapeHtml(text);
            if (!query) {
                return safe;
            }

            const lowerText = text.toLowerCase();
            const index = lowerText.indexOf(query);
            if (index === -1) {
                return safe;
            }

            const end = index + query.length;
            return (
                escapeHtml(text.slice(0, index)) +
                '<mark>' + escapeHtml(text.slice(index, end)) + '</mark>' +
                escapeHtml(text.slice(end))
            );
        }

        function modeMatches(mode, query) {
            if (!query) {
                return true;
            }

            const fields = [mode.label, mode.category, mode.value, mode.id];
            return fields.some((field) => field && field.toLowerCase().includes(query));
        }

        function clampSelectedIndex() {
            if (filtered.length === 0) {
                selectedIndex = 0;
                return;
            }
            if (selectedIndex >= filtered.length) {
                selectedIndex = filtered.length - 1;
            }
            if (selectedIndex < 0) {
                selectedIndex = 0;
            }
        }

        function createItem(mode, index, query) {
            const isCurrent = mode.id === currentModeId;
            const div = document.createElement('div');
            div.className = 'item' +
                (index === selectedIndex ? ' selected' : '') +
                (isCurrent ? ' current' : '');

            div.innerHTML = `
                <div class="mode-info">
                    <span class="label">${highlightText(mode.label, query)}</span>
                    ${isCurrent ? '<span class="current-badge">選択中</span>' : ''}
                </div>
                ${query && mode.value ? `<span class="value-hint">${highlightText(mode.value, query)}</span>` : ''}
            `;

            div.onmouseenter = () => setSelectedIndex(index, false);
            div.onclick = () => select(mode.id);
            return div;
        }

        function updateSelectionHighlight() {
            results.querySelectorAll('.item').forEach((element, index) => {
                element.classList.toggle('selected', index === selectedIndex);
            });
        }

        function scrollSelectedIntoView() {
            const items = results.querySelectorAll('.item');
            items[selectedIndex]?.scrollIntoView({ block: 'nearest' });
        }

        function setSelectedIndex(index, scroll) {
            if (filtered.length === 0) {
                return;
            }

            const next = Math.max(0, Math.min(index, filtered.length - 1));
            if (next === selectedIndex) {
                if (scroll) {
                    scrollSelectedIntoView();
                }
                return;
            }

            selectedIndex = next;
            updateSelectionHighlight();
            if (scroll) {
                scrollSelectedIntoView();
            }
        }

        function renderList(scrollToSelection) {
            results.innerHTML = '';
            const query = normalizeQuery(input.value);
            clampSelectedIndex();

            if (filtered.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = '該当するモードがありません';
                results.appendChild(empty);
                return;
            }

            let itemIndex = 0;
            let lastCategory = null;
            let currentSection = null;
            let rootSection = null;

            filtered.forEach((mode) => {
                let parent = results;

                if (!query) {
                    if (mode.category) {
                        if (mode.category !== lastCategory) {
                            currentSection = document.createElement('div');
                            currentSection.className = 'category-section';

                            const header = document.createElement('div');
                            header.className = 'category-header';
                            header.innerHTML =
                                '<span class="category-accent" aria-hidden="true"></span>' +
                                '<span class="category-label">' + escapeHtml(mode.category) + '</span>';
                            currentSection.appendChild(header);
                            results.appendChild(currentSection);
                            lastCategory = mode.category;
                        }
                        parent = currentSection;
                    } else {
                        if (!rootSection) {
                            rootSection = document.createElement('div');
                            rootSection.className = 'category-section category-section--plain';
                            results.appendChild(rootSection);
                        }
                        parent = rootSection;
                    }
                }

                parent.appendChild(createItem(mode, itemIndex, query));
                itemIndex++;
            });

            if (scrollToSelection) {
                scrollSelectedIntoView();
            }
        }

        function filter() {
            const query = normalizeQuery(input.value);
            const previousId = filtered[selectedIndex]?.id;

            filtered = modes.filter((mode) => modeMatches(mode, query));

            const nextIndex = previousId
                ? filtered.findIndex((mode) => mode.id === previousId)
                : -1;
            selectedIndex = nextIndex !== -1 ? nextIndex : 0;
            renderList(true);
        }

        function select(id) {
            window.ipc.postMessage('select:' + id);
        }

        function close() {
            window.ipc.postMessage('close');
        }

        function moveSelection(delta) {
            if (filtered.length === 0) {
                return;
            }
            setSelectedIndex(selectedIndex + delta, true);
        }

        input.oninput = filter;

        window.onkeydown = (e) => {
            if (e.key === 'ArrowDown') {
                moveSelection(1);
                e.preventDefault();
            } else if (e.key === 'ArrowUp') {
                moveSelection(-1);
                e.preventDefault();
            } else if (e.key === 'Home') {
                if (filtered.length > 0) {
                    setSelectedIndex(0, true);
                    e.preventDefault();
                }
            } else if (e.key === 'End') {
                if (filtered.length > 0) {
                    setSelectedIndex(filtered.length - 1, true);
                    e.preventDefault();
                }
            } else if (e.key === 'Enter') {
                if (filtered[selectedIndex]) {
                    select(filtered[selectedIndex].id);
                    e.preventDefault();
                }
            } else if (e.key === 'Escape') {
                if (input.value) {
                    input.value = '';
                    filter();
                    e.preventDefault();
                } else {
                    close();
                }
            }
        };

        // UI表示時にフォーカスを当てる
        window.focusInput = (modeId) => {
            currentModeId = modeId;
            input.value = '';
            filter();

            const index = filtered.findIndex((mode) => mode.id === currentModeId);
            if (index !== -1) {
                selectedIndex = index;
            }

            renderList(true);
            input.focus();
            input.select();
        };

        renderList(false);
    </script>
</body>

</html>

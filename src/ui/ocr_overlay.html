<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  user-select: none;
  cursor: crosshair;
  background: transparent;
}
#dim {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
}
#sel {
  position: fixed;
  border: 2px solid #4a9eff;
  background: rgba(74, 158, 255, 0.08);
  pointer-events: none;
  display: none;
}
#hint {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font: 14px system-ui, sans-serif;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
  pointer-events: none;
}
</style>
</head>
<body>
<div id="dim"></div>
<div id="sel"></div>
<div id="hint">ドラッグで範囲選択 · Esc でキャンセル</div>
<script>
(function () {
  'use strict';

  const sel = document.getElementById('sel');
  let start = null;
  let dragging = false;

  function post(msg) {
    window.ipc.postMessage(msg);
  }

  function updateSel(x0, y0, x1, y1) {
    const left = Math.min(x0, x1);
    const top = Math.min(y0, y1);
    const width = Math.abs(x1 - x0);
    const height = Math.abs(y1 - y0);
    const visible = width >= 5 && height >= 5;
    sel.style.display = visible ? 'block' : 'none';
    sel.style.left = left + 'px';
    sel.style.top = top + 'px';
    sel.style.width = width + 'px';
    sel.style.height = height + 'px';
  }

  document.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    dragging = true;
    start = { x: e.clientX, y: e.clientY };
    updateSel(start.x, start.y, start.x, start.y);
  });

  document.addEventListener('mousemove', function (e) {
    if (!dragging || !start) return;
    updateSel(start.x, start.y, e.clientX, e.clientY);
  });

  document.addEventListener('mouseup', function (e) {
    if (!dragging || !start) return;
    dragging = false;
    const left = Math.min(start.x, e.clientX);
    const top = Math.min(start.y, e.clientY);
    const width = Math.abs(e.clientX - start.x);
    const height = Math.abs(e.clientY - start.y);
    start = null;
    sel.style.display = 'none';
    if (width < 5 || height < 5) {
      post('cancel');
      return;
    }
    const payload = {
      action: 'select',
      x: Math.round(window.screenX + left),
      y: Math.round(window.screenY + top),
      width: Math.round(width),
      height: Math.round(height),
    };
    post(JSON.stringify(payload));
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      post('cancel');
    }
  });
})();
</script>
</body>
</html>

[package]
name = "ClipRefiner"
version = "0.1.0"
edition = "2024"
authors = ["y_hirata"]
description = "クリップボードのテキストを加工するツール"

[dependencies]
anyhow = "1.0"
arboard = "3.6.1"
clap = { version = "4.5.54", features = ["derive"] }
csv = "1.3"
image = "0.25.1"
notify-rust = "4.11.3"
percent-encoding = "2.3.2"
serde_json = "1.0.149"
single-instance = "0.3.3"
tao = "0.34.5"
tray-icon = "0.21.3"
windows-sys = { version = "0.61.2", features = ["Win32_System_Console"] }

[build-dependencies]
winres = "0.1"

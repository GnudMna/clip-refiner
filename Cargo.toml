[package]
name = "clip-coder"
version = "0.0.1"
edition = "2024"
authors = ["y_hirata"]

[dependencies]
arboard = "3.6.1"
clap = { version = "4.5.54", features = ["derive"] }
percent-encoding = "2.3.2"
tao = "0.34.5"
tray-icon = "0.21.3"
image = "0.25.1"
windows-sys = { version = "0.61.2", features = ["Win32_System_Console"] }
notify-rust = "4.11.3"

[build-dependencies]
winres = "0.1"
